<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>卡牌遊戲 · Card Game</title>
<style>
  /* 入口頁主題（影響分頁列底色）*/
  :root { --bar1:#141c28; --bar2:#0f1620; --accent:#f59e0b; --stage:#0f1419; }
  :root[data-theme="fantasy"] { --bar1:#251a0f; --bar2:#160d05; --accent:#f0a830; --stage:#160d05; }
  :root[data-theme="cyber"]   { --bar1:#0d1b2e; --bar2:#04070f; --accent:#2dd4bf; --stage:#04070f; }
  :root[data-theme="forest"]  { --bar1:#122019; --bar2:#07120c; --accent:#84cc16; --stage:#07120c; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--stage); color: #e6edf3;
    display: flex; flex-direction: column; overflow: hidden;
  }

  .tabbar {
    display: flex; align-items: center; gap: 4px; padding: 8px 12px;
    background: linear-gradient(180deg, var(--bar1), var(--bar2));
    border-bottom: 1px solid #232f3e; flex-shrink: 0;
  }
  .brand {
    font-weight: 800; letter-spacing: 1px; color: var(--accent);
    text-shadow: 0 0 12px color-mix(in srgb, var(--accent) 40%, transparent);
    margin-right: 12px; font-size: 16px; white-space: nowrap;
  }
  .tab {
    appearance: none; border: none; background: transparent; color: #8b98a8;
    font-size: 15px; font-weight: 700; padding: 10px 22px; border-radius: 10px 10px 0 0;
    cursor: pointer; transition: background .15s, color .15s; font-family: inherit;
  }
  .tab:hover { color: #e6edf3; background: rgba(255,255,255,.04); }
  .tab.active {
    color: #1a1206; background: linear-gradient(180deg, var(--accent), #d97706);
    box-shadow: 0 2px 10px color-mix(in srgb, var(--accent) 35%, transparent);
  }
  .tab .ico { margin-right: 6px; }

  /* 主題選擇器（靠右）*/
  .theme-picker { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .theme-picker .lbl { font-size: 12px; color: #8b98a8; }
  .swatch {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
    transition: transform .12s, border-color .12s;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,.5); }
  .swatch[data-theme="dark"]    { background: linear-gradient(135deg,#3b82f6,#16202e); }
  .swatch[data-theme="fantasy"] { background: linear-gradient(135deg,#f0a830,#2a1d10); }
  .swatch[data-theme="cyber"]   { background: linear-gradient(135deg,#2dd4bf,#0a1626); }
  .swatch[data-theme="forest"]  { background: linear-gradient(135deg,#84cc16,#14241a); }

  .stage { position: relative; flex: 1; min-height: 0; }
  .frame {
    position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    background: var(--stage); display: none;
  }
  .frame.active { display: block; }
</style>
</head>
<body>
  <nav class="tabbar">
    <span class="brand">🎴 卡牌遊戲</span>
    <button class="tab active" data-target="battle"><span class="ico">⚔️</span>對戰</button>
    <button class="tab" data-target="pack"><span class="ico">🎁</span>開卡包</button>

    <div class="theme-picker">
      <span class="lbl">主題</span>
      <div class="swatch" data-theme="dark"    title="暗黑"></div>
      <div class="swatch" data-theme="fantasy" title="奇幻"></div>
      <div class="swatch" data-theme="cyber"   title="科幻"></div>
      <div class="swatch" data-theme="forest"  title="森林"></div>
    </div>
  </nav>

  <div class="stage">
    <iframe id="battle" class="frame active" src="card-battle/index.html" title="卡牌對戰"></iframe>
    <iframe id="pack"   class="frame"        src="card-pack/index.html"   title="開卡包"></iframe>
  </div>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const frames = document.querySelectorAll(".frame");
    const swatches = document.querySelectorAll(".swatch");

    function switchTab(target) {
      tabs.forEach((t) => t.classList.toggle("active", t.dataset.target === target));
      frames.forEach((f) => f.classList.toggle("active", f.id === target));
    }
    tabs.forEach((tab) => tab.addEventListener("click", () => switchTab(tab.dataset.target)));

    // 主題切換：套用到入口頁 + 廣播給兩個 iframe + 存 localStorage
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme === "dark" ? "" : theme);
      swatches.forEach((s) => s.classList.toggle("active", s.dataset.theme === theme));
      try { localStorage.setItem("cardgame_theme", theme === "dark" ? "" : theme); } catch {}
      frames.forEach((f) => {
        try { f.contentWindow.postMessage({ type: "setTheme", theme: theme === "dark" ? "" : theme }, "*"); } catch {}
      });
    }
    swatches.forEach((s) => s.addEventListener("click", () => applyTheme(s.dataset.theme)));

    // 子頁要求切換分頁
    window.addEventListener("message", (e) => {
      if (e.data && e.data.type === "switchTab" && e.data.target) switchTab(e.data.target);
    });

    // 初始化：套用已存主題（iframe 載入後再廣播一次確保同步）
    const saved = (() => { try { return localStorage.getItem("cardgame_theme") || "dark"; } catch { return "dark"; } })();
    const initial = saved || "dark";
    document.documentElement.setAttribute("data-theme", initial === "dark" ? "" : initial);
    swatches.forEach((s) => s.classList.toggle("active", s.dataset.theme === (initial || "dark")));
    frames.forEach((f) => f.addEventListener("load", () => {
      try { f.contentWindow.postMessage({ type: "setTheme", theme: initial === "dark" ? "" : initial }, "*"); } catch {}
    }));
  </script>
</body>
</html>
