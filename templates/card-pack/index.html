<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>開卡包 · Card Pack</title>
<style>
  :root {
    --bg1: #1a1430; --bg2: #0d1117; --ink: #e6edf3; --muted: #8b98a8; --accent: #f59e0b;
    --card-w: 132px; --card-h: 186px;
    --bg-img: url("../../assets/backgrounds/dark.png");
  }
  :root[data-theme="fantasy"] { --bg1:#2a1d10; --bg2:#160d05; --accent:#f0a830; --bg-img:url("../../assets/backgrounds/fantasy.png"); }
  :root[data-theme="cyber"]   { --bg1:#0a1626; --bg2:#04070f; --accent:#2dd4bf; --bg-img:url("../../assets/backgrounds/cyber.png"); }
  :root[data-theme="forest"]  { --bg1:#14241a; --bg2:#07120c; --accent:#84cc16; --bg-img:url("../../assets/backgrounds/forest.png"); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI","Microsoft JhengHei",system-ui,sans-serif;
    background: radial-gradient(ellipse at top,var(--bg1),var(--bg2));
    color: var(--ink); min-height: 100vh; overflow-x: hidden;
    display: flex; flex-direction: column; align-items: center; position: relative;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -2;
    background-image: var(--bg-img, none); background-size: cover; background-position: center;
    opacity: .5; filter: saturate(1.1);
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(40% 50% at 25% 25%, color-mix(in srgb, var(--accent) 16%, transparent), transparent 70%),
      radial-gradient(45% 55% at 75% 75%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 70%),
      radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,.6));
    animation: ambientDrift 20s ease-in-out infinite alternate;
  }
  @keyframes ambientDrift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(2%,-2%) scale(1.06)} }
  header { padding: 14px; font-size: 22px; font-weight: 800; letter-spacing: 2px;
    color: var(--accent); text-shadow: 0 0 16px color-mix(in srgb, var(--accent) 50%, transparent); }

  /* 卡包 */
  .pack-stage { min-height: 340px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .pack {
    width: 180px; height: 250px; border-radius: 18px; cursor: pointer;
    background: linear-gradient(160deg,#7c3aed,#4c1d95); border: 3px solid #a855f7;
    box-shadow: 0 0 36px rgba(168,85,247,.6), inset 0 0 30px rgba(0,0,0,.4);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; position: relative; transition: transform .2s; animation: floaty 3s ease-in-out infinite; overflow: hidden;
  }
  .pack::before { content:""; position:absolute; inset:0; background:linear-gradient(120deg,transparent 35%,rgba(255,255,255,.25) 50%,transparent 65%);
    background-size:250% 250%; animation: foilShine 3s linear infinite; }
  .pack:hover { transform: scale(1.06) rotate(-2deg); }
  .pack.opening { animation: packBurst .6s ease forwards; }
  .pack .pack-icon { font-size: 64px; filter: drop-shadow(0 0 12px gold); z-index:1; }
  .pack .pack-label { font-weight: 800; font-size: 18px; z-index:1; }
  .pack .pack-hint { font-size: 12px; color: rgba(255,255,255,.75); z-index:1; }

  .reveal-row { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; padding: 18px; min-height: var(--card-h); }

  .card {
    width: var(--card-w); height: var(--card-h); border-radius: 12px;
    background: linear-gradient(160deg,#222d3d,#18222f); border: 3px solid var(--rarity,#9aa5b1);
    box-shadow: 0 0 18px var(--glow,transparent), 0 6px 16px rgba(0,0,0,.5);
    position: relative; display: flex; flex-direction: column; padding: 8px;
    transform-style: preserve-3d; opacity: 0;
  }
  .card.flip-in { animation: flipIn .55s ease forwards; }
  .card.rare-pull   { animation: flipIn .55s ease forwards, rarityShine 1.4s ease .55s 1; }
  .card.legend-pull { animation: flipIn .55s ease forwards, legendShine 1.8s ease .55s 1; }
  /* 稀有度後方光柱 */
  .card .beam { position:absolute; inset:0; border-radius:12px; pointer-events:none; opacity:0; }
  .card.legend-pull .beam, .card.rare-pull .beam { animation: beamFlash 1.4s ease .4s; }
  .card .beam::after { content:""; position:absolute; left:50%; top:-40%; width:60%; height:180%; transform:translateX(-50%) rotate(8deg);
    background: linear-gradient(180deg, var(--glow), transparent); filter:blur(8px); }

  .card .art { flex:1; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:52px;
    background: radial-gradient(circle,rgba(255,255,255,.08),transparent); overflow:hidden; }
  .card .art img { width:100%; height:100%; object-fit:cover; }
  .card .cost { position:absolute; top:-10px; left:-10px; width:30px; height:30px; border-radius:50%;
    background:#3b82f6; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; border:2px solid #0d2c5e; z-index:3; }
  .card .stars { position:absolute; top:-9px; right:6px; font-size:11px; color:var(--rarity); text-shadow:0 0 5px var(--glow); z-index:3; }
  .card .cardname { font-size:13px; font-weight:800; text-align:center; margin-top:4px; }
  .card .rarity-tag { font-size:10px; text-align:center; color:var(--rarity); font-weight:700; letter-spacing:1px; }
  .card .kwrow { display:flex; gap:3px; justify-content:center; min-height:14px; }
  .card .kw { font-size:12px; }
  .card .stats { display:flex; justify-content:space-between; margin-top:2px; }
  .card .atk,.card .hp { width:26px; height:26px; border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; }
  .card .atk { background:#d97706; } .card .hp { background:#ef4444; }
  .card.spell .stats, .card.spell .kwrow { display:none; }
  /* 閃卡 */
  .card.foil { border-width:4px; box-shadow:0 0 26px gold, 0 6px 16px rgba(0,0,0,.5); }
  .card.foil::after { content:""; position:absolute; inset:0; border-radius:12px; pointer-events:none;
    background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.45) 50%,transparent 70%);
    background-size:250% 250%; animation:foilShine 2s linear infinite; mix-blend-mode:screen; }
  .card .foil-tag { position:absolute; bottom:6px; left:50%; transform:translateX(-50%); font-size:9px; font-weight:800;
    color:#1a1206; background:linear-gradient(90deg,#fde047,#f59e0b); padding:1px 8px; border-radius:8px; z-index:3; }
  /* 重複標記 */
  .card .dup-tag { position:absolute; top:8px; right:6px; font-size:10px; font-weight:800; color:#fff;
    background:rgba(0,0,0,.6); padding:1px 6px; border-radius:8px; z-index:3; }

  .actions { display:flex; gap:12px; padding:14px; flex-wrap:wrap; justify-content:center; }
  button { background:linear-gradient(180deg,var(--accent),#d97706); color:#1a1206; border:none; padding:12px 24px;
    border-radius:24px; font-size:15px; font-weight:800; cursor:pointer;
    box-shadow:0 4px 12px color-mix(in srgb, var(--accent) 40%, transparent); transition:transform .1s; }
  button:hover { transform:scale(1.05); }
  button.ghost { background:#2a3645; color:var(--ink); box-shadow:none; }

  .summary { font-size:13px; color:var(--muted); text-align:center; min-height:20px; }
  .summary .new { color:#4ade80; font-weight:700; } .summary .dup { color:#f59e0b; }

  /* 收藏冊 */
  .collection { width:min(960px,94vw); padding:16px; }
  .collection h2 { font-size:16px; margin-bottom:10px; color:var(--muted); display:flex; justify-content:space-between; align-items:center; }
  .collection .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(74px,1fr)); gap:8px; }
  .slot { aspect-ratio:5/7; border-radius:8px; border:2px solid #2a3645; display:flex; flex-direction:column;
    align-items:center; justify-content:center; font-size:24px; background:#131a24; position:relative; overflow:hidden; }
  .slot.owned { border-color:var(--rarity); box-shadow:0 0 8px var(--glow); }
  .slot.foil { border-color:gold; box-shadow:0 0 12px gold; }
  .slot.locked { filter:grayscale(1) brightness(.4); }
  .slot img { width:34px; height:34px; object-fit:cover; border-radius:4px; }
  .slot .count { position:absolute; bottom:2px; right:4px; font-size:10px; color:var(--accent); font-weight:800; }
  .slot .nm { font-size:8px; color:var(--muted); }
  .slot .fstar { position:absolute; top:2px; right:3px; font-size:9px; color:gold; }

  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes foilShine { 0%{background-position:0% 0%} 100%{background-position:250% 250%} }
  @keyframes packBurst { to { transform:scale(1.4); opacity:0; } }
  @keyframes flipIn { 0%{transform:rotateY(90deg) scale(.7);opacity:0} 100%{transform:rotateY(0) scale(1);opacity:1} }
  @keyframes rarityShine { 0%,100%{box-shadow:0 0 18px var(--glow),0 6px 16px rgba(0,0,0,.5)} 50%{box-shadow:0 0 34px var(--glow),0 0 60px var(--glow)} }
  @keyframes legendShine { 0%,100%{box-shadow:0 0 18px var(--glow),0 6px 16px rgba(0,0,0,.5)} 50%{box-shadow:0 0 50px gold,0 0 90px rgba(245,158,11,.7)} }
  @keyframes beamFlash { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>
  <header>🎴 開卡包 · CARD PACK 🎴</header>

  <div class="pack-stage" id="packStage">
    <div class="pack" id="pack">
      <div class="pack-icon">🎁</div>
      <div class="pack-label">神祕卡包</div>
      <div class="pack-hint">點擊開啟（5 張）</div>
    </div>
  </div>

  <div class="reveal-row" id="revealRow"></div>
  <div class="summary" id="summary"></div>

  <div class="actions" id="actions" style="display:none;">
    <button id="againBtn">再開一包 🎁</button>
    <button class="ghost" id="toBattleBtn">前往對戰 →</button>
  </div>

  <div class="collection">
    <h2>📖 收藏冊 <span id="progress"></span></h2>
    <div class="grid" id="collectionGrid"></div>
  </div>

  <script src="../card-battle/cards.js"></script>
  <script src="pack.js"></script>
  <script>
    window.addEventListener("message", (e) => {
      if (e.data && e.data.type === "setTheme") document.documentElement.setAttribute("data-theme", e.data.theme);
    });
    try { const t = localStorage.getItem("cardgame_theme"); if (t) document.documentElement.setAttribute("data-theme", t); } catch {}
  </script>
</body>
</html>
