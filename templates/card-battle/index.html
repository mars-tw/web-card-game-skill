<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>卡牌對戰 · Card Battle</title>
<style>
  /* ===== 主題變數（由入口頁注入 data-theme 覆寫）===== */
  :root {
    --bg1: #16202e; --bg2: #0f1419;
    --panel: #1a2230; --panel-border: #2a3645;
    --ink: #e6edf3; --muted: #8b98a8;
    --mana: #3b82f6; --hp: #ef4444; --accent: #f59e0b;
    --card-w: 124px; --card-h: 176px;
    --bg-img: url("../../assets/backgrounds/dark.png");
  }
  :root[data-theme="fantasy"] {
    --bg1: #2a1d10; --bg2: #160d05;
    --panel: #251a0f; --panel-border: #4a361c;
    --accent: #f0a830; --mana: #2f80ed;
    --bg-img: url("../../assets/backgrounds/fantasy.png");
  }
  :root[data-theme="cyber"] {
    --bg1: #0a1626; --bg2: #04070f;
    --panel: #0d1b2e; --panel-border: #1b3a5c;
    --accent: #2dd4bf; --mana: #38bdf8; --hp: #f43f5e;
    --bg-img: url("../../assets/backgrounds/cyber.png");
  }
  :root[data-theme="forest"] {
    --bg1: #14241a; --bg2: #07120c;
    --panel: #122019; --panel-border: #234a32;
    --accent: #84cc16; --mana: #22c55e;
    --bg-img: url("../../assets/backgrounds/forest.png");
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
    background: radial-gradient(ellipse at top, var(--bg1), var(--bg2));
    color: var(--ink); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    user-select: none; overflow-x: hidden; position: relative;
  }
  /* 背景圖層（依主題切換，--bg-img 由各主題設定）*/
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -2;
    background-image: var(--bg-img, none);
    background-size: cover; background-position: center;
    opacity: .55; filter: saturate(1.1);
  }
  /* 動態氛圍層：兩團緩慢飄移的光暈 + 暗角 */
  body::after {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(40% 50% at 20% 30%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 70%),
      radial-gradient(45% 55% at 80% 70%, color-mix(in srgb, var(--mana) 14%, transparent), transparent 70%),
      radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,.6));
    animation: ambientDrift 18s ease-in-out infinite alternate;
  }
  @keyframes ambientDrift {
    0%   { transform: translate(0, 0) scale(1); opacity: .9; }
    100% { transform: translate(-2%, 2%) scale(1.06); opacity: 1; }
  }
  header {
    width: 100%; text-align: center; padding: 8px; font-weight: 700;
    letter-spacing: 2px; color: var(--accent);
    text-shadow: 0 0 12px color-mix(in srgb, var(--accent) 50%, transparent);
  }

  .board { width: min(980px, 97vw); flex: 1; display: flex; flex-direction: column; gap: 7px; padding: 7px; }
  .board.shake-screen { animation: screenShake .26s; }

  .hero-row {
    display: flex; justify-content: space-between; align-items: center;
    background: color-mix(in srgb, var(--panel) 82%, transparent);
    border-radius: 12px; padding: 8px 16px;
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 12px rgba(0,0,0,.35);
  }
  .hero { display: flex; align-items: center; gap: 10px; cursor: pointer; transition: transform .15s; }
  .hero.targetable { animation: pulseTarget 1s infinite; cursor: crosshair; }
  .hero .avatar { font-size: 32px; }
  .hero .name { font-weight: 600; }
  .hp-badge, .mana-badge {
    display: inline-flex; align-items: center; gap: 4px; color: #fff;
    font-weight: 700; padding: 2px 10px; border-radius: 20px; font-size: 15px;
  }
  .hp-badge { background: var(--hp); } .mana-badge { background: var(--mana); }

  .battlefield {
    min-height: var(--card-h); display: flex; gap: 8px; justify-content: center;
    align-items: center; padding: 6px; border-radius: 12px;
    /* 戰場棋盤質感：深色半透明 + 細格線紋理 + 內陰影，像放在真實戰場上 */
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 38px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0 1px, transparent 1px 38px),
      linear-gradient(180deg, rgba(10,14,20,.55), rgba(10,14,20,.35));
    border: 1px solid color-mix(in srgb, var(--accent) 25%, var(--panel-border));
    box-shadow: inset 0 2px 16px rgba(0,0,0,.5), inset 0 0 30px color-mix(in srgb, var(--accent) 8%, transparent);
    backdrop-filter: blur(1px); transition: background .2s, box-shadow .2s;
  }
  .battlefield.enemy {
    border-color: color-mix(in srgb, var(--hp) 30%, var(--panel-border));
    box-shadow: inset 0 2px 16px rgba(0,0,0,.5), inset 0 0 30px rgba(239,68,68,.06);
  }
  .battlefield .empty-hint { color: var(--muted); font-size: 13px; opacity: .7; }

  /* ===== 卡片 ===== */
  .card {
    width: var(--card-w); height: var(--card-h); border-radius: 10px;
    background: linear-gradient(160deg, #222d3d, #18222f);
    border: 2px solid var(--rarity, #9aa5b1);
    /* 稀有度色階：普通卡 glow-size:0 不發光，越稀有越亮（CP1-10）*/
    box-shadow: 0 0 var(--glow-size, 0) var(--glow, transparent), 0 4px 10px rgba(0,0,0,.45);
    position: relative; display: flex; flex-direction: column; padding: 5px;
    cursor: pointer; transition: transform .15s, box-shadow .2s; flex-shrink: 0;
  }
  /* 史詩/傳說：金屬漸層邊框 */
  .card.rarity-epic { border-image: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed) 1; }
  .card.rarity-legendary { border-image: linear-gradient(135deg, #fde047, #f59e0b, #fbbf24) 1; }
  /* 傳說：常駐呼吸光 */
  .card.legend-idle { animation: legendIdle 2.2s ease-in-out infinite; }
  @keyframes legendIdle {
    0%,100% { box-shadow: 0 0 18px var(--glow), 0 4px 10px rgba(0,0,0,.45); }
    50% { box-shadow: 0 0 34px var(--glow), 0 0 50px var(--glow), 0 4px 10px rgba(0,0,0,.45); }
  }
  .card:hover { transform: translateY(-8px) scale(1.05); z-index: 5; }
  .card.playable { box-shadow: 0 0 16px var(--glow), 0 0 0 2px var(--accent); }
  .card.disabled { filter: grayscale(.6) brightness(.7); cursor: not-allowed; }
  .card.can-attack { box-shadow: 0 0 14px #22c55e, 0 0 0 1px #22c55e; }
  .card.selected { outline: 3px solid var(--accent); transform: translateY(-8px) scale(1.05); z-index: 6; }
  .card.targetable { animation: pulseTarget 1s infinite; }
  .card.blocked { filter: grayscale(.7) brightness(.6); }
  .card.spawn { animation: spawnIn .4s cubic-bezier(.2,1.3,.5,1); }
  .card.dying { animation: dieOut .45s ease forwards; pointer-events: none; }
  .card.attacking { animation: lunge .3s ease; }
  .card.lunge-to { animation: lungeTo .36s ease; z-index: 30; }
  .card.hit-shake { animation: hitShake .3s; }
  .card.damaged { animation: flashRed .4s; }
  .card.shield-break { animation: shieldBreak .4s; }
  .card.shield-gain { animation: shieldGain .5s; }
  .card.poisoned { animation: poisonHit .5s; }
  .card.regen { animation: regenPulse .6s; }

  /* 閃卡 foil */
  .card.foil { border-width: 3px; }
  .card.foil::after {
    content: ""; position: absolute; inset: 0; border-radius: 10px; pointer-events: none;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.35) 50%, transparent 70%);
    background-size: 250% 250%; animation: foilShine 2.5s linear infinite; mix-blend-mode: screen;
  }

  .card .cost {
    position: absolute; top: -8px; left: -8px; width: 28px; height: 28px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #60a5fa, #2563eb); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 15px; border: 2px solid #0d2c5e; z-index: 3;
    box-shadow: 0 2px 6px rgba(0,0,0,.5), inset 0 1px 2px rgba(255,255,255,.4);
  }
  .card .stars { position: absolute; top: -7px; right: 4px; font-size: 9px; color: var(--rarity);
    text-shadow: 0 0 4px var(--glow); letter-spacing: -1px; z-index: 3; }
  .card .shield-ring {
    position: absolute; inset: -3px; border-radius: 12px; border: 2px solid #fde047;
    box-shadow: 0 0 12px #fde047, inset 0 0 8px #fde047; pointer-events: none; z-index: 2;
    animation: shieldPulse 1.6s ease-in-out infinite;
  }
  .card .art {
    flex: 1; border-radius: 6px; margin-bottom: 3px; display: flex; align-items: center; justify-content: center;
    font-size: 42px; background: radial-gradient(circle, rgba(255,255,255,.08), rgba(0,0,0,.2));
    overflow: hidden;
    /* 內陷框：讓卡面藝術區有立體感（CP1-11）*/
    box-shadow: inset 0 2px 6px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.08);
  }
  .card .art img { width: 100%; height: 100%; object-fit: cover; }
  .card .kwrow { display: flex; gap: 2px; justify-content: center; min-height: 14px; }
  .card .kw { font-size: 11px; line-height: 1; filter: drop-shadow(0 0 2px rgba(0,0,0,.6)); cursor: help; }
  /* 卡名底帶（CP1-11）*/
  .card .cardname { font-size: 11px; font-weight: 800; text-align: center; line-height: 1.1;
    background: rgba(0,0,0,.35); border-radius: 4px; padding: 1px 2px; }
  .card .cardtext { font-size: 9px; color: #b9c4cd; text-align: center; line-height: 1.15; min-height: 18px;
    background: rgba(0,0,0,.2); border-radius: 3px; padding: 1px; }
  .card .stats { display: flex; justify-content: space-between; margin-top: auto; }
  /* 寶石漸層的攻擊/血量徽章 + 高光（CP1-11）*/
  .card .atk, .card .hp { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-weight: 900; font-size: 13px; color: #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,.5), inset 0 1px 2px rgba(255,255,255,.4); }
  .card .atk { background: radial-gradient(circle at 35% 30%, #fbbf24, #d97706); }
  .card .hp { background: radial-gradient(circle at 35% 30%, #f87171, #dc2626); }
  .card .hp.hurt { background: radial-gradient(circle at 35% 30%, #ef4444, #991b1b); box-shadow: 0 0 8px #ef4444, inset 0 1px 2px rgba(255,255,255,.4); }
  .card.spell-card .stats, .card.spell-card .kwrow { display: none; }

  .hand { display: flex; gap: 5px; justify-content: center; align-items: flex-end;
    min-height: calc(var(--card-h) + 12px); padding: 5px; flex-wrap: wrap; }

  .controls { display: flex; gap: 12px; align-items: center; justify-content: center; padding: 6px; }
  .diff-pick { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted);
    background: color-mix(in srgb, var(--panel) 82%, transparent); padding: 6px 12px; border-radius: 20px;
    border: 1px solid var(--panel-border); backdrop-filter: blur(4px); }
  .diff-pick select { background: var(--panel); color: var(--ink); border: 1px solid var(--panel-border);
    border-radius: 12px; padding: 4px 8px; font-family: inherit; font-weight: 700; cursor: pointer; }
  button.end-turn {
    background: linear-gradient(180deg, var(--accent), #d97706); color: #1a1206; font-weight: 800; font-size: 15px;
    border: none; padding: 11px 26px; border-radius: 24px; cursor: pointer;
    box-shadow: 0 4px 12px color-mix(in srgb, var(--accent) 40%, transparent); transition: transform .1s;
  }
  button.end-turn:hover { transform: scale(1.05); }
  /* 起手重抽（CP2-6）*/
  button.mulligan-btn { background: linear-gradient(180deg, #38bdf8, #0ea5e9); color: #04263a; font-weight: 800;
    font-size: 14px; border: none; padding: 11px 20px; border-radius: 24px; cursor: pointer;
    box-shadow: 0 4px 12px rgba(56,189,248,.4); transition: transform .1s; margin-right: 8px; }
  button.mulligan-btn:hover { transform: scale(1.05); }
  button.end-turn:disabled { filter: grayscale(1) brightness(.6); cursor: not-allowed; }

  #log { height: 52px; overflow-y: auto; width: min(980px, 97vw); font-size: 12px; color: var(--muted);
    padding: 4px 12px; text-align: center; line-height: 1.5; }
  #log .me { color: #60a5fa; } #log .ai { color: #f87171; }

  /* 浮動傷害 / 技能提示 */
  .dmg-float { position: fixed; transform: translate(-50%, 0); font-weight: 900;
    pointer-events: none; z-index: 150; animation: dmgFloat .85s ease-out forwards; }
  /* 傷害數字分級（CP1-12）*/
  .dmg-float.dmg-sm { color: #fff; font-size: 18px; text-shadow: 0 2px 3px #000; }
  .dmg-float.dmg-mid { color: #fde047; font-size: 24px; text-shadow: 0 0 6px #f59e0b, 0 2px 3px #000; }
  .dmg-float.dmg-big { color: #fca5a5; font-size: 32px; text-shadow: 0 0 10px #ef4444, 0 0 18px #dc2626, 0 2px 3px #000; }
  /* 命中閃白 + 火花（CP1-12）*/
  .card.hit-flash { animation: hitShake .3s, hitFlash .25s; }
  @keyframes hitFlash { 0%,100%{filter:none} 40%{filter:brightness(2.6) contrast(1.4)} }
  .hit-spark { position: fixed; width: 5px; height: 5px; border-radius: 50%; pointer-events: none; z-index: 149;
    background: radial-gradient(circle, #fff, #fde047); box-shadow: 0 0 6px #fbbf24;
    transform: translate(-50%, -50%); animation: sparkFly .42s ease-out forwards; }
  @keyframes sparkFly { 0%{opacity:1; transform:translate(-50%,-50%)} 100%{opacity:0; transform:translate(calc(-50% + var(--sx)), calc(-50% + var(--sy)))} }
  /* 連擊回饋（CP2-8）*/
  .combo-float { position: fixed; transform: translate(-50%, 0); color: #fb923c; font-weight: 900;
    font-size: 20px; text-shadow: 0 0 8px #f97316, 0 2px 3px #000; pointer-events: none; z-index: 151;
    animation: dmgFloat .9s ease-out forwards; }
  .kw-pop { position: fixed; transform: translate(-50%, 0); color: #fff; font-weight: 800; font-size: 13px;
    background: rgba(168,85,247,.9); padding: 2px 8px; border-radius: 10px; pointer-events: none; z-index: 150;
    animation: kwPop .9s ease-out forwards; white-space: nowrap; }

  .overlay { position: fixed; inset: 0; background: rgba(8,10,14,.9); display: none; align-items: center;
    justify-content: center; flex-direction: column; gap: 18px; z-index: 100; }
  .overlay.show { display: flex; }
  .overlay h1 { font-size: 52px; animation: overlayPop .6s ease; }
  .overlay.win h1 { color: #fde047; text-shadow: 0 0 24px #f59e0b; }
  .overlay.lose h1 { color: #f87171; text-shadow: 0 0 24px #b91c1c; }
  .overlay button { background: var(--accent); color: #1a1206; border: none; padding: 12px 32px;
    border-radius: 24px; font-size: 16px; font-weight: 800; cursor: pointer; }
  .result-stats { display: flex; flex-direction: column; gap: 8px; align-items: center; font-size: 15px; color: var(--ink); }
  .result-stats .streak { font-size: 22px; font-weight: 900; color: #fb923c; text-shadow: 0 0 16px #f97316; }
  .result-stats .coin { color: #facc15; font-weight: 800; font-size: 17px; }
  .result-stats .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* 新手引導 + 關鍵字圖鑑（CP0-15）*/
  .cb-tutorial, .kw-codex { position: fixed; inset: 0; background: rgba(6,10,14,.92); display: none;
    align-items: center; justify-content: center; z-index: 110; padding: 16px; }
  .cb-tutorial.show, .kw-codex.show { display: flex; }
  .cb-tut-card, .kw-codex-card { background: linear-gradient(180deg, #1a2230, #0f1620);
    border: 1px solid rgba(255,255,255,.12); border-radius: 18px; padding: 24px 26px; max-width: 440px; width: 100%;
    box-shadow: 0 12px 40px rgba(0,0,0,.5); max-height: 90vh; overflow-y: auto; }
  .cb-tut-card h2, .kw-codex-card h2 { color: var(--accent, #f59e0b); font-size: 23px; margin-bottom: 14px; text-align: center; }
  .cb-tut-card ol { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .cb-tut-card li { font-size: 14px; line-height: 1.5; }
  .cb-tut-card li b { color: #facc15; }
  .cb-tut-tip { font-size: 12px; color: #9fb0a4; background: rgba(245,158,11,.1); padding: 10px 12px; border-radius: 10px; margin-bottom: 16px; line-height: 1.5; }
  .cb-tut-card button, .kw-codex-card button { width: 100%; background: linear-gradient(180deg,#f59e0b,#d97706);
    color: #1a1206; border: none; padding: 13px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }
  .kw-codex-btn { position: fixed; bottom: 12px; right: 12px; z-index: 60; background: #1a2230;
    color: #e6edf3; border: 1px solid rgba(255,255,255,.15); padding: 8px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
  #kwCodexList { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .kw-codex-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,.04); }
  .kw-codex-item .kwi { font-size: 22px; } .kw-codex-item .kwn { font-weight: 800; color: #facc15; }
  .kw-codex-item .kwd { font-size: 12px; color: #9fb0a4; }

  /* ===== 動畫 ===== */
  @keyframes spawnIn { 0% { transform: translateY(40px) scale(.4) rotate(-8deg); opacity: 0; } 60% { transform: translateY(-6px) scale(1.08); } 100% { transform: translateY(0) scale(1); opacity: 1; } }
  @keyframes dieOut { 0% { transform: scale(1) rotate(0); filter: brightness(1); } 100% { transform: scale(.2) rotate(20deg); opacity: 0; filter: brightness(3) blur(3px); } }
  @keyframes lunge { 50% { transform: translateY(-14px) scale(1.1); } }
  @keyframes lungeTo { 50% { transform: translate(var(--lx,0), var(--ly,0)) scale(1.12); } }
  @keyframes hitShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px) rotate(-3deg)} 60%{transform:translateX(6px) rotate(3deg)} }
  @keyframes flashRed { 0%,100%{filter:none} 40%{filter:brightness(1.8) saturate(2) drop-shadow(0 0 8px #ef4444)} }
  @keyframes shieldBreak { 0%{filter:none} 30%{filter:brightness(2.5) drop-shadow(0 0 14px #fde047)} 100%{filter:none} }
  @keyframes shieldGain { 0%,100%{filter:none} 50%{filter:brightness(1.6) drop-shadow(0 0 12px #fde047)} }
  @keyframes poisonHit { 0%{filter:none} 40%{filter:hue-rotate(80deg) brightness(1.4) drop-shadow(0 0 14px #22c55e)} 100%{filter:saturate(.3) brightness(.7)} }
  @keyframes regenPulse { 0%,100%{filter:none} 50%{filter:brightness(1.4) drop-shadow(0 0 14px #f472b6)} }
  @keyframes shieldPulse { 0%,100%{opacity:.7} 50%{opacity:1} }
  @keyframes foilShine { 0%{background-position:0% 0%} 100%{background-position:250% 250%} }
  @keyframes screenShake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-4px,2px)} 50%{transform:translate(4px,-2px)} 75%{transform:translate(-2px,3px)} }
  @keyframes dmgFloat { 0%{transform:translate(-50%,0) scale(.6);opacity:0} 20%{transform:translate(-50%,-6px) scale(1.3);opacity:1} 100%{transform:translate(-50%,-40px) scale(1);opacity:0} }
  @keyframes kwPop { 0%{transform:translate(-50%,0) scale(.6);opacity:0} 25%{transform:translate(-50%,-10px) scale(1.1);opacity:1} 100%{transform:translate(-50%,-30px) scale(1);opacity:0} }
  @keyframes overlayPop { 0%{transform:scale(.3);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  @keyframes pulseTarget { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
</style>
</head>
<body>
  <header>⚔️ 卡牌對戰 · CARD BATTLE ⚔️</header>

  <div class="board">
    <div class="hero-row">
      <div class="hero" id="enemyHero">
        <span class="avatar">😈</span><span class="name">電腦對手</span>
      </div>
      <div><span class="hp-badge">❤️ <span id="enemyHp">30</span></span></div>
    </div>

    <div class="battlefield enemy" id="enemyField"></div>
    <div class="battlefield" id="playerField"></div>

    <div class="hero-row">
      <div class="hero" id="playerHero">
        <span class="avatar">🦸</span><span class="name">你</span>
      </div>
      <div style="display:flex; gap:8px;">
        <span class="mana-badge">💧 <span id="playerMana">1</span>/<span id="playerManaMax">1</span></span>
        <span class="hp-badge">❤️ <span id="playerHp">30</span></span>
      </div>
    </div>

    <div class="hand" id="playerHand"></div>
    <div class="controls">
      <label class="diff-pick">難度
        <select id="difficultySel">
          <option value="easy">簡單</option>
          <option value="normal" selected>普通</option>
          <option value="hard">困難</option>
        </select>
      </label>
      <button class="mulligan-btn" id="mulliganBtn" style="display:none">🔄 重抽起手牌</button>
      <button class="end-turn" id="endTurnBtn">結束回合 ▶</button>
    </div>
  </div>

  <div id="log"></div>

  <div class="overlay" id="overlay">
    <h1 id="overlayTitle">勝利！</h1>
    <div class="result-stats" id="resultStats"></div>
    <button id="restartBtn">再來一局</button>
  </div>

  <!-- 首次遊玩引導（CP0-15）-->
  <div class="cb-tutorial" id="cbTutorial">
    <div class="cb-tut-card">
      <h2>⚔️ 對戰教學</h2>
      <ol>
        <li><b>① 出牌</b>：點手牌中費用足夠的卡（隨從上場、法術立即生效）</li>
        <li><b>② 攻擊</b>：點你的隨從選為攻擊者，再點敵方隨從或英雄</li>
        <li><b>③ 打臉獲勝</b>：把敵方英雄血量打到 0 就贏！</li>
        <li><b>④ 善用技能</b>：嘲諷🛡擋路、衝鋒⚡即攻、聖盾✨擋傷、戰吼📣亡語💀觸發效果</li>
      </ol>
      <p class="cb-tut-tip">💡 法力每回合 +1。點下方「關鍵字」隨時查技能說明。開卡包抽強卡組牌組！</p>
      <button id="cbTutOk">開始對戰 ▶</button>
    </div>
  </div>

  <!-- 關鍵字圖鑑（CP0-15 觸控友善）-->
  <button class="kw-codex-btn" id="kwCodexBtn">📖 關鍵字</button>
  <div class="kw-codex" id="kwCodex">
    <div class="kw-codex-card">
      <h2>📖 關鍵字圖鑑</h2>
      <div id="kwCodexList"></div>
      <button id="kwCodexClose">關閉</button>
    </div>
  </div>

  <script src="cards.js"></script>
  <script src="battle.js"></script>
  <script>
    // 接收入口頁的主題切換
    window.addEventListener("message", (e) => {
      if (e.data && e.data.type === "setTheme") {
        document.documentElement.setAttribute("data-theme", e.data.theme);
      }
    });
    // 初次載入沿用 localStorage 主題
    try { const t = localStorage.getItem("cardgame_theme"); if (t) document.documentElement.setAttribute("data-theme", t); } catch {}

    // 難度選擇器：讀取既有設定，換難度時存檔並重開一局
    (function setupDifficulty() {
      const sel = document.getElementById("difficultySel");
      let cur = "easy";
      try { cur = localStorage.getItem("cardgame_difficulty") || "easy"; } catch {}
      sel.value = cur;
      sel.addEventListener("change", () => {
        try { localStorage.setItem("cardgame_difficulty", sel.value); } catch {}
        // 立即以新難度重開一局
        if (window.__newGame) window.__newGame();
      });
    })();

    // 新手引導（CP0-15）：首次顯示，存 localStorage
    (function setupTutorial() {
      let seen = false;
      try { seen = localStorage.getItem("cb_tutorial_seen") === "1"; } catch {}
      if (!seen) document.getElementById("cbTutorial").classList.add("show");
      document.getElementById("cbTutOk").onclick = () => {
        document.getElementById("cbTutorial").classList.remove("show");
        try { localStorage.setItem("cb_tutorial_seen", "1"); } catch {}
      };
    })();

    // 關鍵字圖鑑（CP0-15 觸控友善：手機看不到 title tooltip）
    (function setupCodex() {
      const list = document.getElementById("kwCodexList");
      if (window.KEYWORDS) {
        list.innerHTML = Object.values(window.KEYWORDS).map(kw =>
          `<div class="kw-codex-item"><span class="kwi">${kw.icon}</span><span><span class="kwn">${kw.label}</span><br><span class="kwd">${kw.desc}</span></span></div>`
        ).join("");
      }
      document.getElementById("kwCodexBtn").onclick = () => document.getElementById("kwCodex").classList.add("show");
      document.getElementById("kwCodexClose").onclick = () => document.getElementById("kwCodex").classList.remove("show");
    })();
  </script>
</body>
</html>
